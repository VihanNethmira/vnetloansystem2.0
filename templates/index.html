<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage {{ username }}</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 10px; margin: 0; }
        .container { max-width: 800px; margin: auto; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #059669; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .ledger { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid #ddd; }
        .col { padding: 10px; min-height: 200px; }
        .left { border-right: 1px solid #ddd; background: #fffafb; } 
        .right { background: #fafffa; } 
        .row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; border-bottom: 1px solid #f0f0f0; padding-bottom: 4px; align-items: center; }
        .date { font-size: 10px; color: #888; font-weight: bold; }
        .del { color: #ef4444; text-decoration: none; font-weight: bold; margin-left: 10px; font-size: 18px; cursor: pointer; }
        .form-box { margin-top: 20px; background: white; padding: 15px; border-radius: 8px; }
        .form-group { display: flex; flex-direction: column; gap: 10px; }
        input, select, button { padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        button { background: #2563eb; color: white; border: none; font-weight: bold; cursor: pointer; }
        @media (max-width: 600px) { .ledger { grid-template-columns: 1fr; } .left { border-right: none; border-bottom: 2px solid #ddd; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><strong>{{ username }}</strong><span>Balance: <b>{{ balance }}</b></span></div>
    <div class="ledger">
        <div class="col left">
            <center><small>USAGE (+)</small></center><br>
            {% for row in rows if row[6] == 'take' %}
            <div class="row">
                <span><span class="date">{{ row[3] }}</span> {{ row[4] }}</span>
                <span><b>{{ row[5] }}</b><a href="/delete_entry/{{ username }}/{{ row[0] }}" class="del" onclick="return confirm('Delete transaction?')">&times;</a></span>
            </div>
            {% endfor %}
        </div>
        <div class="col right">
            <center><small>PAYMENTS (-)</small></center><br>
            {% for row in rows if row[6] == 'give' %}
            <div class="row">
                <span><span class="date">{{ row[3] }}</span> {{ row[4] }}</span>
                <span><b style="color: green;">{{ row[5] }}</b><a href="/delete_entry/{{ username }}/{{ row[0] }}" class="del" onclick="return confirm('Delete transaction?')">&times;</a></span>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
<div class="container form-box">
    <form action="/add/{{ username }}" method="POST">
        <div class="form-group">
            <input type="text" name="custom_date" placeholder="Date (MM/DD)">
            <input type="text" name="description" placeholder="Description" required>
            <input type="number" name="amount" placeholder="Amount" step="0.01" required>
            <select name="type"><option value="give" selected>Give (-)</option><option value="take">Take (+)</option></select>
            <button type="submit">Add Entry</button>
        </div>
    </form>
    <center style="margin-top: 15px;"><a href="/" style="color: #666; text-decoration: none; font-size: 14px;">← Back Home</a></center>
</div>
</body>
</html>
