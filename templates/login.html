<!DOCTYPE html>
<html>
<head>
    <title>VNET Login</title>
    <style>
        body { font-family: sans-serif; background: #1e293b; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; }
        input { padding: 12px; width: 250px; border: 1px solid #ddd; border-radius: 4px; display: block; margin: 10px auto; }
        button { padding: 12px; background: #059669; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>VNET Management</h2>
        <form action="/login" method="POST">
            <input type="password" name="password" placeholder="Master Password" required autofocus>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
