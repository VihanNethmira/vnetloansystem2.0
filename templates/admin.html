<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 15px; margin: 0; }
        .card { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .total-banner { background: #1e293b; color: white; padding: 20px; border-radius: 6px; text-align: center; margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        .btn-sm { font-size: 11px; text-decoration: none; padding: 6px 10px; border-radius: 4px; font-weight: bold; display: inline-block; color: white; margin-top: 5px; }
        
        @media (max-width: 600px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr { margin-bottom: 15px; border: 1px solid #ddd; padding: 10px; border-radius: 8px; }
            td { border: none; padding: 8px 0; display: flex; justify-content: space-between; border-bottom: 1px solid #f9f9f9; }
            td::before { content: attr(data-label); font-weight: bold; color: #666; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="total-banner">
            <small>Business Balance ({{ month }})</small>
            <h2 style="margin: 5px 0;">Rs. {{ grand_total }}</h2>
        </div>
        <table>
            <thead><tr><th>User</th><th>Balance</th><th>Actions</th></tr></thead>
            <tbody>
                {% for u in users %}
                <tr>
                    <td data-label="User"><strong>{{ u.name }}</strong></td>
                    <td data-label="Balance" style="color: {{ '#ef4444' if u.balance > 0 else '#059669' }}"><b>{{ u.balance }}</b></td>
                    <td data-label="Actions">
                        <a href="/user/{{ u.name }}" class="btn-sm" style="background: #2563eb;">Manage</a>
                        <a href="/view/{{ u.slug }}" class="btn-sm" style="background: #64748b;">Share Link</a>
                        <a href="/delete_user/{{ u.name }}" class="btn-sm" style="background: #dc2626;" onclick="return confirm('Delete all records for {{ u.name }}?')">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <center><a href="/" style="display:block; margin-top:20px; color:#666; text-decoration:none;">← Back Home</a></center>
    </div>
</body>
</html>
